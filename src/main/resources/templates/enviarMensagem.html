<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mensagens</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
          crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1>Mensagens</h1>


    <div th:if="${mensagem != null}" class="alert alert-success">
        <p th:text="${mensagem}"></p>
    </div>


    <div th:if="${erro != null}" class="alert alert-danger">
        <p th:text="${erro}"></p>
    </div>


    <form action="#" th:action="@{'/enviar-mensagem'}" method="post">
        <div class="form-group">
            <label for="nomeDestinatario">Nome do Destinatário:</label>
            <input type="text" class="form-control" id="nomeDestinatario" name="nomeDestinatario">
        </div>
        <div class="form-group">
            <label for="mensagem">Mensagem:</label>
            <textarea class="form-control" id="mensagem" name="mensagem" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar Mensagem</button>
    </form>


</div>
</body>
</html>
